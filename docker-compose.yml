version: '3.8'

services:
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager-app-1
    restart: unless-stopped
    ports:
      - '80:80'   # HTTP Traffic
      - '81:81'   # Admin Web-Oberfläche
      - '443:443' # HTTPS Traffic
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - proxy-network

  rmdsystems-web:
    image: 'nginx:alpine'
    container_name: rmdsystems-web
    restart: unless-stopped
    ports:
      - '8020:80'
    volumes:
      - ./html:/usr/share/nginx/html
    networks:
      - proxy-network

networks:
  proxy-network:
    driver: bridge
